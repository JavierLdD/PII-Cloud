# Runtime env vars for the deployed PDF text extraction Cloud Run Job.
# DATABASE_URL is intentionally kept here for plain-env deploys.
# Do not set DATABASE_URL_SECRET when using this file.
DATABASE_URL: ""

# Per-run values. Pass them at execution time with --update-env-vars.
SUBSCRIPTION_ID: ""
TOPIC_PII_ENTITIES: "projects/ldd-dev/topics/pii-entities"
TOPIC_TEXT_POISON: "projects/ldd-dev/topics/pii-text-poison"

EXPECTED_USER_ID: ""
EXPECTED_RUN_ID: ""

TEXT_MATERIALIZE_SCRATCH_DIR: "/tmp/pii-text"
TEXT_MATERIALIZE_SMALL_LIMIT_BYTES: "104857600"
TEXT_MATERIALIZE_GLOBAL_LIMIT_BYTES: "524288000"
TEXT_MATERIALIZE_LEASE_TTL_SECONDS: "7200"
TEXT_MATERIALIZE_REQUEUE_DELAY_SECONDS: "5"
TEXT_EXTRACT_MAX_FILE_BYTES: "104857600"

PER_FILE_TIMEOUT_SECONDS: "540"
PUBSUB_IDLE_TIMEOUT_SECONDS: "60"
PUBSUB_PULL_TIMEOUT_SECONDS: "5"
MAX_MESSAGES: "0"
LOG_LEVEL: "INFO"

# Leave both empty to use ADC/service account auth in Cloud Run.
# Set both only for local OAuth fallback or Secret Manager-mounted OAuth files.
GOOGLE_CLIENT_SECRETS_FILE: ""
GOOGLE_TOKEN_FILE: ""
