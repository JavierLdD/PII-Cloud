# Primary contract. In real runs, replace this with a concrete JSON object or
# override SCAN_REQUEST_JSON at execution time.
SCAN_REQUEST_JSON: ""

# Legacy fallback env vars. These are used only when SCAN_REQUEST_JSON is empty.
BBDD_SOURCE_ID: ""
BBDD_USER_ID: ""
BBDD_RUN_NAME: ""
BBDD_SOURCE_NAME: "database"
BBDD_SOURCE_TYPE: "database"
# BBDD_DATABASE_URL can be provided in a local/custom env file when using the
# legacy fallback. It is intentionally omitted here to avoid committing or
# deploying credentials by accident.
BBDD_DATABASE_DIALECT: ""
BBDD_DATABASE_TYPE: ""
BBDD_INCLUDE_SCHEMAS: ""
BBDD_EXCLUDE_SCHEMAS: ""
BBDD_INCLUDE_TABLES: ""
BBDD_EXCLUDE_TABLES: ""
BBDD_EXCLUDE_VIEWS: "false"
BBDD_ALLOW_FULL_DATABASE_SCAN: "false"
BBDD_CONFIRM_FULL_SCAN: "false"
BBDD_PROFILE_ONLY: "false"
BBDD_DISABLE_ZERO_SHOT: "false"
BBDD_USE_GPU: "false"
BBDD_OUTPUT_LOCAL_PATH: "/tmp/table_extract_discovery.json"
TABLE_EXTRACT_ZERO_SHOT_DEVICE: "cpu"
TABLE_EXTRACT_ZERO_SHOT_MODEL_URI: "gs://BUCKET/Models/zero-shot/mdeberta-xnli/v1"
TABLE_EXTRACT_ZERO_SHOT_LOCAL_DIR: "/tmp/pii-models/zero-shot"
TABLE_EXTRACT_ZERO_SHOT_BATCH_SIZE: "8"
GCS_OUTPUT_URI: ""
# Mandatory in deployed runs. Put the real value only in an ignored local YAML.
BBDD_RESULTS_DATABASE_URL: ""
LOG_LEVEL: "INFO"
