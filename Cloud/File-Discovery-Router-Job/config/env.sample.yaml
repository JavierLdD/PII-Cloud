# Dynamic executions should override DISCOVERY_ROUTER_REQUEST_JSON.
DISCOVERY_ROUTER_REQUEST_JSON: ""

# Pub/Sub topics used by the cloud Router stage.
TOPIC_PDF: "projects/PROJECT_ID/topics/pii-route-pdf"
TOPIC_OCR: "projects/PROJECT_ID/topics/pii-route-ocr"
TOPIC_DOC: "projects/PROJECT_ID/topics/pii-route-doc"
TOPIC_TABLES: "projects/PROJECT_ID/topics/pii-route-tables"
TOPIC_UNSUPPORTED: "projects/PROJECT_ID/topics/pii-route-unsupported"

# DATABASE_URL should normally be attached via Secret Manager, not committed here.
LOG_LEVEL: "INFO"
PUBSUB_PUBLISH_TIMEOUT_SECONDS: "60"

# Bump this immutable value whenever extraction/entity semantics change. Results
# are reused only between snapshots with the same revision.
VISOR_PIPELINE_REVISION: "pii-pipeline-v1"

# Optional local OAuth fallback for development. In Cloud Run, prefer ADC/service
# account access or Secret Manager-mounted files.
GOOGLE_CLIENT_SECRETS_FILE: ""
GOOGLE_TOKEN_FILE: ""
